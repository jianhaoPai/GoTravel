name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          cp web/config.example.js web/config.js
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" web/config.js
          sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" web/config.js
          sed -i "s|AMAP_KEY_PLACEHOLDER|${{ secrets.AMAP_KEY }}|g" web/config.js
          sed -i "s|AMAP_SECURITY_CODE_PLACEHOLDER|${{ secrets.AMAP_SECURITY_CODE }}|g" web/config.js

      - name: Verify config has no placeholders left
        run: |
          if grep -q 'PLACEHOLDER' web/config.js; then
            echo "❌ 仍有未替换的占位符，请检查 GitHub Secrets 是否全部设置："
            grep 'PLACEHOLDER' web/config.js
            exit 1
          fi
          echo "✅ config.js 注入完成"

      - name: Deploy web folder to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
